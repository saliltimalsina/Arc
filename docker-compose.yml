services:
  db:
    image: postgres:16-alpine
    container_name: mantra-arc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: mantra_arc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d mantra_arc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mantra-arc-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: mantra-arc-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 3012
      DATABASE_URL: postgresql://dev:dev@db:5432/mantra_arc
      REDIS_URL: redis://redis:6379
      WEB_URL: http://localhost:3013
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3012:3012"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3012/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3012}
    container_name: mantra-arc-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3012}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3013:3000"

volumes:
  postgres_data:
  redis_data: