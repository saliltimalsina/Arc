[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @mantra-arc/api build"

[deploy]
startCommand = "pnpm --filter @mantra-arc/api exec prisma migrate deploy && pnpm --filter @mantra-arc/api start"
healthcheckPath = "/api"
healthcheckTimeout = 30
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3

[environment]
NODE_ENV = "production"
